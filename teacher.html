<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">
    <h2>Teacher Dashboard</h2>

<div class="card mb-4">
    <div class="card-body">
        <h5>Create New Question</h5>

        <form id="questionForm">
            <div class="mb-3">
                <!-- <label for="questionText" class="form-label">Question</label> -->
                <input 
                    type="text" 
                    id="questionText" 
                    class="form-control" 
                    placeholder="Enter your poll question"
                    required
                >
            </div>

                        <div class="mb-3">
                <!-- <label for="optionA" class="form-label">Option A</label> -->
                <input 
                    type="text" 
                    id="optionA" 
                    class="form-control" 
                    placeholder="Option A"
                    required
                >
            </div>

                                    <div class="mb-3">
                <!-- <label for="optionB" class="form-label">Option B</label> -->
                <input 
                    type="text" 
                    id="optionB" 
                    class="form-control" 
                    placeholder="Option B"
                    
                >
            </div>
                                    <div class="mb-3">
                <!-- <label for="optionC" class="form-label">Option C</label> -->
                <input 
                    type="text" 
                    id="optionC" 
                    class="form-control" 
                    placeholder="Option C"
                    
                >
            </div>
                                                <div class="mb-3">
                <!-- <label for="optionD" class="form-label">Option D</label> -->
                <input 
                    type="text" 
                    id="optionD" 
                    class="form-control" 
                    placeholder="Option D"
                    
                >
            </div>

            <button type="submit" class="btn btn-primary">
                Create Question
            </button>
        </form>
    </div>
</div>




    <!-- Question selector -->
    <div class="mb-3">
        <label class="form-label">Select Question</label>
        <select id="questionSelect" class="form-select"></select>
    </div>

    <!-- Results -->
    <div class="card">
        <div class="card-body">
            <h5>Live Results</h5>
            <ul id="resultsList" class="list-group"></ul>
        </div>
    </div>
</div>

<script>
const API_BASE = "https://polling-back.onrender.com";

const ROOM_CODE = "franz-room";
let CURRENT_ROOM_ID = null;

let currentQuestionId = null;


async function loadRoom() {
    const res = await fetch(`${API_BASE}/api/rooms/code/${ROOM_CODE}`);
    const room = await res.json();

    CURRENT_ROOM_ID = room.id;

    console.log("Current room:", room);
}



// Load questions on page load
async function loadQuestions() {
    if (!CURRENT_ROOM_ID) return;

    const res = await fetch(`${API_BASE}/api/questions/room/${CURRENT_ROOM_ID}`);
    const questions = await res.json();

    const select = document.getElementById("questionSelect");
    select.innerHTML = "";

    questions.forEach(q => {
        const option = document.createElement("option");
        option.value = q.id;
        option.textContent = q.questionText;
        select.appendChild(option);
    });

    if (questions.length > 0) {
        currentQuestionId = questions[0].id;
        select.value = currentQuestionId;
    }
}

// Fetch results
async function loadResults() {
    if (!currentQuestionId) return;

    const res = await fetch(`${API_BASE}/api/poll-responses/${currentQuestionId}/results`);
    const data = await res.json();

    const list = document.getElementById("resultsList");
    list.innerHTML = "";

    Object.entries(data).forEach(([option, count]) => {
        const li = document.createElement("li");
        li.className = "list-group-item d-flex justify-content-between";
        li.innerHTML = `<span>${option}</span><strong>${count}</strong>`;
        list.appendChild(li);
    });
}

// Handle dropdown change
document.getElementById("questionSelect").addEventListener("change", (e) => {
    currentQuestionId = e.target.value;
    loadResults();
});

// Initial load
loadRoom().then(() => {
    loadQuestions().then(loadResults);
});

// 🔁 Auto refresh every 2 seconds
setInterval(loadResults, 2000);


document.getElementById("questionForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const questionText = document.getElementById("questionText").value;
    const optionA = document.getElementById("optionA").value;
const optionB = document.getElementById("optionB").value;
const optionC = document.getElementById("optionC").value;
const optionD = document.getElementById("optionD").value;

    const response = await fetch(`${API_BASE}/api/questions`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
    roomId: CURRENT_ROOM_ID,
    questionText: questionText,
    optionA: optionA,
    optionB: optionB,
    optionC: optionC,
    optionD: optionD
})
    });

    const newQuestion = await response.json();

    document.getElementById("questionText").value = "";
        document.getElementById("optionA").value = "";
        document.getElementById("optionB").value = "";
        document.getElementById("optionC").value = "";
        document.getElementById("optionD").value = "";


    await loadQuestions();

    currentQuestionId = newQuestion.id;
    document.getElementById("questionSelect").value = currentQuestionId;


    loadResults();
});
</script>

</body>
</html>
